<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Tables with Chatbot</title>
    <link rel="stylesheet" href="file.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="app-logo">
            <h2>WeatherApp</h2>
        </div>
        <nav>
            <a href="file.html">Dashboard</a>
            <a href="tables.html" class="active">Tables</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header>
            <h1>Weather Tables</h1>
            <div class="user-profile">
                <img src="user.png" alt="User Profile" class="user-avatar">
                <div class="user-name">John Doe</div>
                <div class="user-dropdown">
                    <ul>
                        <li><a href="#">Profile</a></li>
                        <li><a href="#">Settings</a></li>
                        <li><a href="#">Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Temperature Forecast Table -->
        <section class="table-section">
            <h2>Temperature Forecast for the Next 5 Days</h2>
            <div class="input-section">
                <input type="text" id="city-input" placeholder="Enter city name">
                <button id="get-weather-btn">Get Weather</button>
            </div>
            <table id="forecast-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>City</th>
                        <th>Min Temp (°C)</th>
                        <th>Max Temp (°C)</th>
                    </tr>
                </thead>
                <tbody id="forecast-body">
                </tbody>
            </table>

            <!-- Pagination Controls -->
            <div class="pagination">
                <button id="prev-page" disabled>Previous</button>
                <span id="page-info">Page 1 of 1</span>
                <button id="next-page" disabled>Next</button>
            </div>
        </section>

        <!-- Chatbot Section -->
        <section class="chatbot-section">
            <div class="chatbot">
                <h2>Chatbot</h2>
                <div id="chatbox"></div>
                <input type="text" id="chat-input" placeholder="Ask me something...">
                <button id="send-btn">Send</button>
            </div>
        </section>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
